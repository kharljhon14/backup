<div class="bg-light py-12 rounded-5 mb-18">
  <div class=" row ">
    <div class="col-lg-8 col-md-10 col-11 mx-auto">
      {{if {this.title} }}
      <h2 class="fs-4">{{this.title}}</h2>
      {{/if}}
      <div class="">{{this.body}}</div>
      <div class="d-flex align-items-center justify-content-center gap-2 mt-12">
        {{if {this.cta_button_link} }}
        <a
          class="btn btn-info"
          href="{{this.cta_button_link}}"
          target="{{if {this.should_link_open_to_a_new_tab} }}_blank{{else}}_self{{/if}}"
        >
          {{this.cta_button_text}}
        </a>
        {{/if}} {{if {this.cta_button_link_2} }}
        <a
          class="btn btn-secondary"
          href="{{this.cta_button_link_2}}"
          target="{{if {this.should_link_open_to_a_new_tab_2} }}_blank{{else}}_self{{/if}}"
        >
          {{this.cta_button_text_2}}
        </a>
        {{/if}}
      </div>
    </div>
  </div>
</div>
